x-orchestrator-common: &orchestrator-common
  restart: unless-stopped
  build:
    context: .
    dockerfile: Dockerfile
  depends_on:
    - whisper
    - piper
    - pyannote
  env_file:
    - .env.docker
  environment:
    - PYTHONUNBUFFERED=1
    # Internal service endpoints for compose network
    - WHISPER_URL=http://whisper:10000
    - PIPER_URL=http://piper:10001
    - RECORDER_PYANNOTE_URL=http://pyannote:10002
    - MPD_HOST=127.0.0.1
    - MPD_PORT=6600
    # Model/cache paths inside container
    - SILERO_MODEL_CACHE_DIR=/app/docker/silero-models
    - OPENWAKEWORD_MODELS_DIR=/app/docker/wakeword-models
    - EMOTION_MODELS_DIR=/app/docker/emotion-models
    - MODELSCOPE_CACHE=/app/.cache/modelscope
  extra_hosts:
    # Allows container -> host access (Linux compatible with Docker 20.10+)
    - "host.docker.internal:host-gateway"
  volumes:
    - ./docker/silero-models:/app/docker/silero-models
    - ./docker/wakeword-models:/app/docker/wakeword-models
    - ./docker/emotion-models:/app/docker/emotion-models
    - ./docker/whisper-models:/app/docker/whisper-models
    - ./docker/pyannote-models:/app/docker/pyannote-models
    - ./docker/piper-data:/app/docker/piper-data
    - ./.env:/app/.env:ro
    - ./.env.docker:/app/.env.docker:ro
    - ./.env.pi:/app/.env.pi:ro
    # Persist OpenClaw device identity for websocket auth signatures
    - ${HOME}/.openclaw:/root/.openclaw
    # Music library for MPD skill
    - ${HOME}/music:/music:ro
    # Shared MPD->orchestrator FIFO path
    - ${MPD_FIFO_HOST_PATH:-/tmp/openclaw-mpd-fifo}:/tmp/mpd-fifo

services:
  whisper:
    restart: unless-stopped
    build:
      context: ./docker/whisper
      dockerfile: Dockerfile.whispercpp
    ports:
      - "10000:10000"
    environment:
      - PYTHONUNBUFFERED=1
      - MODEL_PATH=/models/ggml-large-v3.bin
      - WHISPER_CPP_PATH=/app/build/bin/whisper-cli
      - WHISPER_BACKEND_PREFERENCE=${WHISPER_BACKEND_PREFERENCE:-auto}
      - WHISPER_CPU_FALLBACK=${WHISPER_CPU_FALLBACK:-true}
    volumes:
      - ./docker/whisper-models:/models:rw
    # GPU passthrough for Vulkan (auto-detected; remove on non-GPU systems)
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render

  snapserver:
    restart: unless-stopped
    image: ghcr.io/badaix/snapserver:latest
    profiles:
      - snapcast
    ports:
      - "1704:1704"
      - "1705:1705"
      - "1780:1780"
    command:
      - "--stream.source=pipe:///tmp/mpd-fifo/music.pcm?name=mpd_fifo&mode=read&sampleformat=44100:16:2"
    volumes:
      - ${MPD_FIFO_HOST_PATH:-/tmp/openclaw-mpd-fifo}:/tmp/mpd-fifo


  piper:
    restart: unless-stopped
    build:
      context: ./docker/piper
      dockerfile: Dockerfile
    ports:
      - "10001:10001"
    environment:
      - PYTHONUNBUFFERED=1
      - PIPER_VOICE_ID=${PIPER_VOICE_ID:-en_US-amy-medium}
      - PIPER_BACKEND_PREFERENCE=${PIPER_BACKEND_PREFERENCE:-auto}
      - PIPER_CPU_FALLBACK=${PIPER_CPU_FALLBACK:-true}
    volumes:
      - ./docker/piper-data:/root/.local/share/piper

  pyannote:
    restart: unless-stopped
    build:
      context: ./docker/pyannote
      dockerfile: Dockerfile
    ports:
      - "10002:10002"
    environment:
      - PYTHONUNBUFFERED=1
      - PYANNOTE_MODEL_ID=${RECORDER_PYANNOTE_MODEL:-pyannote/speaker-diarization-3.1}
      - PYANNOTE_AUTH_TOKEN=${RECORDER_PYANNOTE_AUTH_TOKEN:-}
      - PYANNOTE_BACKEND_PREFERENCE=${PYANNOTE_BACKEND_PREFERENCE:-auto}
      - PYANNOTE_CPU_FALLBACK=${PYANNOTE_CPU_FALLBACK:-true}
      - HF_HOME=/models
    volumes:
      - ./docker/pyannote-models:/models
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render

  # Cross-platform-safe default orchestrator container.
  # Works on Linux/macOS/Windows, but direct host microphone/speaker mapping
  # requires one of the Linux audio profile services below.
  # NOTE: Disabled by default - use orchestrator-linux-alsa for Linux with audio
  orchestrator:
    <<: *orchestrator-common
    profiles:
      - manual  # Don't start by default - use orchestrator-linux-alsa
    environment:
      - AUDIO_CAPTURE_DEVICE=hw:2,0
      - AUDIO_PLAYBACK_DEVICE=hw:1,0
    
  # Linux ALSA hardware pass-through profile (direct /dev/snd access)
  # DEFAULT: This is the working orchestrator for Linux desktop
  orchestrator-linux-alsa:
    <<: *orchestrator-common
    environment:
      - AUDIO_CAPTURE_DEVICE=hw:2,0
      - AUDIO_PLAYBACK_DEVICE=hw:1,0
    devices:
      - "/dev/snd:/dev/snd"
      - "/dev/input:/dev/input:ro"
      - "/dev/uinput:/dev/uinput"
    group_add:
      - "audio"

  # Linux PulseAudio/PipeWire socket profile (desktop-friendly)
  # Uses host networking so localhost host services (gateway, mapped STT/TTS ports)
  # are reachable directly from the container.
  orchestrator-linux-pulse:
    <<: *orchestrator-common
    profiles:
      - manual  # Don't start by default - requires PulseAudio-enabled PortAudio
    network_mode: host
    environment:
      - OPENCLAW_ENV_FILE=/app/.env.docker
      - PYTHONUNBUFFERED=1
      - WHISPER_URL=http://127.0.0.1:10000
      - PIPER_URL=http://127.0.0.1:10001
      - OPENCLAW_GATEWAY_URL=http://127.0.0.1:18789
      - MPD_HOST=127.0.0.1
      - MPD_PORT=6600
      - SILERO_MODEL_CACHE_DIR=/app/docker/silero-models
      - OPENWAKEWORD_MODELS_DIR=/app/docker/wakeword-models
      - EMOTION_MODELS_DIR=/app/docker/emotion-models
      - MODELSCOPE_CACHE=/app/.cache/modelscope
      - PULSE_SERVER=unix:/tmp/pulse/native
      - AUDIO_CAPTURE_DEVICE=default
      - AUDIO_PLAYBACK_DEVICE=default
    volumes:
      - ./docker/silero-models:/app/docker/silero-models
      - ./docker/wakeword-models:/app/docker/wakeword-models
      - ./docker/emotion-models:/app/docker/emotion-models
      - ./docker/whisper-models:/app/docker/whisper-models
      - ./docker/piper-data:/app/docker/piper-data
      - ./.env:/app/.env:ro
      - ./.env.docker:/app/.env.docker:ro
      - ./.env.pi:/app/.env.pi:ro
      - ${HOME}/.openclaw:/root/.openclaw
      - ${XDG_RUNTIME_DIR}/pulse/native:/tmp/pulse/native
      - ${HOME}/.config/pulse/cookie:/root/.config/pulse/cookie:ro
      # Music library for MPD skill
      - ${HOME}/Music:/music:ro
      # Shared MPD->orchestrator FIFO path
      - ${MPD_FIFO_HOST_PATH:-/tmp/openclaw-mpd-fifo}:/tmp/mpd-fifo
    devices:
      - "/dev/input:/dev/input:ro"
      - "/dev/uinput:/dev/uinput"


